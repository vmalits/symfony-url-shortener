# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/{Entity,Exception,Event,ValueObject}/'
            - '../src/Domain/Click/ValueObject/'
            - '../src/Domain/ShortUrl/ValueObject/'
            - '../src/Domain/User/ValueObject/'
            - '../src/Kernel.php'

    # Domain repository interfaces → infrastructure implementations
    App\Domain\ShortUrl\Repository\ShortUrlRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineShortUrlRepository

    App\Domain\Click\Repository\ClickRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineClickRepository

    App\Domain\User\Repository\UserRepositoryInterface:
        alias: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineUserRepository
